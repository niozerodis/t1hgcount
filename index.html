<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T1 四月主場日購物紀錄</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gray: { 750: '#2d3748' }
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gray-900 text-gray-100 p-4 md:p-8 font-sans">

  <div class="max-w-6xl mx-auto">
    <header class="mb-8 border-l-4 border-red-600 pl-4">
      <h1 class="text-3xl font-bold tracking-tight">T1 四月主場日購物紀錄</h1>
      <p class="text-gray-400">純 HTML + Tailwind 輕量版</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
      <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
        <p class="text-sm text-gray-400">目前條件下總金額</p>
        <p class="text-4xl font-black text-white" id="total-amount">NT$ 0</p>
      </div>
      <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
        <p class="text-sm text-gray-400">剩餘待付金額 (未付費)</p>
        <p class="text-4xl font-black text-red-500" id="pending-amount">NT$ 0</p>
      </div>
    </div>

    <div class="bg-gray-800 p-4 rounded-xl mb-8 grid grid-cols-1 sm:grid-cols-3 gap-4">
      <div>
        <label class="block text-xs text-gray-500 mb-1">篩選購買日</label>
        <select id="filter-date" class="w-full bg-gray-700 text-white rounded-lg p-2 border-none outline-none">
          <option value="">全部日期</option>
          <option value="4/24">4/24</option>
          <option value="4/25">4/25</option>
          <option value="4/26">4/26</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">篩選購買人</label>
        <select id="filter-purchaser" class="w-full bg-gray-700 text-white rounded-lg p-2 border-none outline-none">
          <option value="">全部人員</option>
          <option value="Nio">Nio</option>
          <option value="慕斯">慕斯</option>
          <option value="阿龍">阿龍</option>
        </select>
      </div>
      <div>
        <label class="block text-xs text-gray-500 mb-1">篩選選手</label>
        <select id="filter-player" class="w-full bg-gray-700 text-white rounded-lg p-2 border-none outline-none">
          <option value="">全部選手</option>
          <option value="無">無</option>
          <option value="Doran">Doran</option>
          <option value="Oner">Oner</option>
          <option value="Faker">Faker</option>
          <option value="Peyz">Peyz</option>
          <option value="Keria">Keria</option>
        </select>
      </div>
    </div>

    <div id="loading" class="text-center text-gray-400 py-8">
      正在載入 T1 購物資料...
    </div>

    <div class="overflow-x-auto bg-gray-800 rounded-2xl border border-gray-700 hidden" id="table-container">
      <table class="w-full text-left border-collapse">
        <thead class="bg-gray-700">
          <tr>
            <th class="p-4">內容</th>
            <th class="p-4">價格 (TWD)</th>
            <th class="p-4 text-center">已付</th>
          </tr>
        </thead>
        <tbody id="table-body">
          </tbody>
      </table>
    </div>
  </div>

  <script>
    // ！！！請將下方替換成你的 Google Apps Script 部署網址 ！！！
    const GAS_URL = 'YOUR_GAS_WEB_APP_URL'; 
    
    let allRecords = [];

    // DOM 元素
    const filterDate = document.getElementById('filter-date');
    const filterPurchaser = document.getElementById('filter-purchaser');
    const filterPlayer = document.getElementById('filter-player');
    const totalAmountEl = document.getElementById('total-amount');
    const pendingAmountEl = document.getElementById('pending-amount');
    const tableBody = document.getElementById('table-body');
    const loadingEl = document.getElementById('loading');
    const tableContainer = document.getElementById('table-container');

    // 初始化：抓取資料
    async function fetchRecords() {
      try {
        const response = await fetch(GAS_URL);
        allRecords = await response.json();
        
        // 隱藏載入中，顯示表格
        loadingEl.classList.add('hidden');
        tableContainer.classList.remove('hidden');
        
        renderData();
      } catch (error) {
        loadingEl.innerHTML = '<span class="text-red-500">載入失敗，請確認 GAS 網址是否正確且有開啟 CORS 權限。</span>';
        console.error('Error fetching data:', error);
      }
    }

    // 渲染表格與計算總計
    function renderData() {
      const dateVal = filterDate.value;
      const purchaserVal = filterPurchaser.value;
      const playerVal = filterPlayer.value;

      // 1. 執行篩選
      const filteredRecords = allRecords.filter(record => {
        const matchDate = !dateVal || record['購買日'] === dateVal;
        const matchPurchaser = !purchaserVal || record['購買人'] === purchaserVal;
        const matchPlayer = !playerVal || record['選手'] === playerVal;
        return matchDate && matchPurchaser && matchPlayer;
      });

      // 2. 清空並重建表格內容
      tableBody.innerHTML = '';
      let total = 0;
      let pending = 0;

      filteredRecords.forEach(record => {
        const price = Number(record['台幣價格']) || 0;
        const isPaid = record['是否付費'] === true || record['是否付費'] === 'TRUE';
        
        // 計算金額
        total += price;
        if (!isPaid) {
          pending += price;
        }

        // 建立表格列
        const tr = document.createElement('tr');
        tr.className = 'border-t border-gray-700 hover:bg-gray-750 transition-colors';
        tr.innerHTML = `
          <td class="p-4">
            <div class="font-bold">${record['商品名稱'] || '未命名商品'}</div>
            <div class="text-xs text-gray-400">
              ${record['購買日']} · ${record['購買人']} · ${record['選手']}
            </div>
          </td>
          <td class="p-4 font-mono text-lg text-white">
            $${price.toLocaleString()}
          </td>
          <td class="p-4 text-center text-xl">
            ${isPaid ? '✅' : '⏳'}
          </td>
        `;
        tableBody.appendChild(tr);
      });

      // 3. 更新總金額文字
      totalAmountEl.textContent = `NT$ ${total.toLocaleString()}`;
      pendingAmountEl.textContent = `NT$ ${pending.toLocaleString()}`;
    }

    // 監聽篩選器變更事件
    filterDate.addEventListener('change', renderData);
    filterPurchaser.addEventListener('change', renderData);
    filterPlayer.addEventListener('change', renderData);

    // 載入網頁時執行
    fetchRecords();
  </script>
</body>
</html>
